# Cloud Build → Artifact Registry image for Cloud Run (GCP migration Phase 4).
# Builds linux/amd64 in-cloud (no local Docker daemon needed) and passes the
# NEXT_PUBLIC_* build args (public values, safe to bake into the client bundle).
# Server secrets are NOT here — Cloud Run injects them at runtime.
#
# Run:
#   gcloud builds submit --config cloudbuild.yaml \
#     --substitutions=\
# _NEXT_PUBLIC_FIREBASE_API_KEY=<key>,_NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=<proj>.firebaseapp.com,\
# _NEXT_PUBLIC_FIREBASE_PROJECT_ID=<proj>,_NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=<proj>.firebasestorage.app,\
# _NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=<id>,_NEXT_PUBLIC_FIREBASE_APP_ID=<appid>,\
# _NEXT_PUBLIC_ROOT_DOMAIN=storemink.com,_NEXT_PUBLIC_APP_URL=https://storemink.com

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_IMAGE}
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_API_KEY=${_NEXT_PUBLIC_FIREBASE_API_KEY}
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${_NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_NEXT_PUBLIC_FIREBASE_PROJECT_ID}
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${_NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${_NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_APP_ID=${_NEXT_PUBLIC_FIREBASE_APP_ID}
      - --build-arg
      - NEXT_PUBLIC_ROOT_DOMAIN=${_NEXT_PUBLIC_ROOT_DOMAIN}
      - --build-arg
      - NEXT_PUBLIC_APP_URL=${_NEXT_PUBLIC_APP_URL}
      - .

images:
  - ${_IMAGE}

# npm ci + next build for this app can exceed Cloud Build's 10-min default.
timeout: 1800s

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _IMAGE: asia-south1-docker.pkg.dev/storemink-prod/storemink/web:latest
  _NEXT_PUBLIC_FIREBASE_API_KEY: ""
  _NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ""
  _NEXT_PUBLIC_FIREBASE_PROJECT_ID: ""
  _NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ""
  _NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ""
  _NEXT_PUBLIC_FIREBASE_APP_ID: ""
  _NEXT_PUBLIC_ROOT_DOMAIN: storemink.com
  _NEXT_PUBLIC_APP_URL: https://storemink.com
