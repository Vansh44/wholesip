# Cloud Build CI/CD — build, push, and DEPLOY to Cloud Run, per environment.
#
# Triggered by GitHub pushes; one trigger per branch → environment:
#   staging branch → service storemink-web       (staging Firebase / DB / bucket)
#   main    branch → service storemink-web-prod  (prod    Firebase / DB / bucket)
#
# Each trigger supplies the per-env substitution VALUES — see docs/gcp-ci-cd.md
# for the exact staging + prod value sets and the one-time IAM/secret setup.
#
# ⚠ NEXT_PUBLIC_* are BAKED INTO THE IMAGE at build time (they end up in the
# client bundle), so they MUST be passed as build args here. An empty value
# ships a broken bundle — and historically crashed `next build` (an empty
# ROOT_DOMAIN → PLATFORM_URL "https:" → new URL() throws). The code now degrades
# to storemink.com, but the trigger must still pass the real per-env values.

steps:
  # 1. Build + push, with registry-backed Docker layer caching (buildx).
  #    `--cache-to mode=max` exports EVERY stage — including the expensive
  #    `npm ci` deps layer — to a per-env `:buildcache-<tag>` image in Artifact
  #    Registry. A later build whose package-lock.json is unchanged reuses that
  #    layer and skips reinstalling node_modules. `--push` uploads the final
  #    image itself (docker-container driver builds straight to the registry, so
  #    there's NO separate push step and the `images:` block is gone — listing it
  #    would make Cloud Build re-push a non-existent local image and fail).
  #    NEXT_PUBLIC_* are still baked into the client bundle here.
  #    ($$ escapes the $ so Cloud Build leaves the bash expansion for the shell;
  #    the cache tag is derived from _IMAGE, so triggers need no new value.)
  - id: build-push
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        IMAGE="${_IMAGE}"
        CACHE="$${IMAGE%:*}:buildcache-$${IMAGE##*:}"
        docker buildx create --use --name sm --driver docker-container 2>/dev/null \
          || docker buildx use sm
        docker buildx build \
          -t "$${IMAGE}" \
          --push \
          --provenance=false \
          --cache-from "type=registry,ref=$${CACHE}" \
          --cache-to "type=registry,ref=$${CACHE},mode=max" \
          --build-arg "NEXT_PUBLIC_FIREBASE_API_KEY=${_NEXT_PUBLIC_FIREBASE_API_KEY}" \
          --build-arg "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${_NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}" \
          --build-arg "NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_NEXT_PUBLIC_FIREBASE_PROJECT_ID}" \
          --build-arg "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${_NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}" \
          --build-arg "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${_NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}" \
          --build-arg "NEXT_PUBLIC_FIREBASE_APP_ID=${_NEXT_PUBLIC_FIREBASE_APP_ID}" \
          --build-arg "NEXT_PUBLIC_ROOT_DOMAIN=${_NEXT_PUBLIC_ROOT_DOMAIN}" \
          --build-arg "NEXT_PUBLIC_APP_URL=${_NEXT_PUBLIC_APP_URL}" \
          .

  # 2. Deploy to the per-env Cloud Run service (runtime env + secrets + Cloud SQL).
  #    --set-env-vars / --set-secrets REPLACE the full set, so every runtime value
  #    the app needs is listed here. Server secrets stay in Secret Manager.
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_IMAGE}
      - --region=${_RUN_REGION}
      - --service-account=${_RUN_SA}
      - --allow-unauthenticated
      - --port=8080
      - --min-instances=${_MIN_INSTANCES}
      - --max-instances=4
      - --add-cloudsql-instances=${_DB_CONN}
      - --set-env-vars=GCP_PROJECT_ID=${_GCP_PROJECT_ID},GCP_LOCATION=global,GCS_BUCKET=${_GCS_BUCKET},DB_HOST=/cloudsql/${_DB_CONN},DB_USER=app,DB_NAME=${_DB_NAME},FIREBASE_PROJECT_ID=${_FIREBASE_PROJECT_ID},FIREBASE_SERVICE_ACCOUNT_ID=${_FIREBASE_SA_ID},FIREBASE_API_KEY=${_NEXT_PUBLIC_FIREBASE_API_KEY},GOOGLE_SEARCH_CONSOLE_PROPERTY=${_GOOGLE_SEARCH_CONSOLE_PROPERTY},NEXT_PUBLIC_ROOT_DOMAIN=${_NEXT_PUBLIC_ROOT_DOMAIN},NEXT_PUBLIC_APP_URL=${_NEXT_PUBLIC_APP_URL}
      - --set-secrets=DB_PASSWORD=${_DB_PASSWORD_SECRET}:latest,CRON_SECRET=CRON_SECRET:latest,RESEND_API_KEY=RESEND_API_KEY:latest,PAYMENT_CRED_KEY=${_PAYMENT_CRED_KEY_SECRET}:latest,RAZORPAY_KEY_ID=${_RAZORPAY_KEY_ID_SECRET}:latest,RAZORPAY_KEY_SECRET=${_RAZORPAY_KEY_SECRET_SECRET}:latest,RAZORPAY_WEBHOOK_SECRET=${_RAZORPAY_WEBHOOK_SECRET_SECRET}:latest

# buildx --push uploads the image directly, so no `images:` block (it would make
# Cloud Build try to re-push a non-existent local image).

# npm ci + next build is heavy — and slower on the 2-vCPU free-tier machine — so
# stay well above Cloud Build's 10-min default. Caching (step 1) claws the npm ci
# time back whenever the lockfile is unchanged.
timeout: 1800s

options:
  # No machineType ⇒ the DEFAULT e2-standard-2 (2 vCPU / 8 GB) in the default
  # pool — the ONLY machine covered by Cloud Build's free tier (2,500
  # build-minutes/month; $0.006/min after). e2-medium is cheaper per-minute but
  # gets NO free allocation, so the default is both free AND faster for us. RAM
  # is unchanged from the old E2_HIGHCPU_8 (both 8 GB), so no new OOM risk on
  # `next build` — only fewer vCPUs (8 → 2), i.e. slower, offset by the cache.
  logging: CLOUD_LOGGING_ONLY

# Defaults target STAGING, so a bare `gcloud builds submit` is the safe env.
# The two triggers override these — see docs/gcp-ci-cd.md.
substitutions:
  _IMAGE: asia-south1-docker.pkg.dev/storemink-prod/storemink/web:staging
  _SERVICE: storemink-web
  _RUN_REGION: asia-south1
  _RUN_SA: storemink-run@storemink-prod.iam.gserviceaccount.com
  _GCP_PROJECT_ID: storemink-prod
  _MIN_INSTANCES: "0"
  # ⚠ SHARED-INSTANCE MODEL: staging is the `storemink_staging` DATABASE inside
  # the prod instance (storemink-prod-db) — there is no separate staging
  # instance. The database is chosen by _DB_NAME (lib/db/client.ts), NOT by the
  # instance, so the PROD trigger MUST pass _DB_NAME=storemink. If prod ever
  # inherits this staging default it would connect to the STAGING database.
  # Both triggers therefore set _DB_NAME explicitly (see docs/gcp-ci-cd.md).
  _DB_CONN: storemink-prod:asia-south1:storemink-prod-db
  _DB_NAME: storemink_staging
  # One instance ⇒ one cluster-wide `app` role ⇒ one password, so staging
  # authenticates with the prod instance's app secret. (Optional hardening
  # before real customers: a restricted `app_staging` role with its own secret
  # + a _DB_USER substitution, so staging creds physically cannot reach the
  # prod database.)
  _DB_PASSWORD_SECRET: CLOUDSQL_PROD_APP_PW
  # Payments + Razorpay — per-env VALUES via env-specific secret NAMES. Secret
  # Manager is per-project and staging+prod share the storemink-prod project, so
  # a value differs only by pointing at a *_STAGING vs *_PROD secret (same trick
  # as _DB_PASSWORD_SECRET). Defaults target STAGING = Razorpay TEST keys; the
  # PROD trigger overrides all four to the *_PROD secrets = Razorpay LIVE keys.
  # PAYMENT_CRED_KEY intentionally differs per env (a leaked staging key must not
  # decrypt prod-stored BYO-gateway creds). The naming looks doubled
  # (…_KEY_SECRET_SECRET) because the env var itself ends in _SECRET and the
  # substitution suffix _SECRET means "the Secret Manager name for this var".
  _PAYMENT_CRED_KEY_SECRET: PAYMENT_CRED_KEY_STAGING
  _RAZORPAY_KEY_ID_SECRET: RAZORPAY_KEY_ID_STAGING
  _RAZORPAY_KEY_SECRET_SECRET: RAZORPAY_KEY_SECRET_STAGING
  _RAZORPAY_WEBHOOK_SECRET_SECRET: RAZORPAY_WEBHOOK_SECRET_STAGING
  _GCS_BUCKET: storemink-media
  _FIREBASE_PROJECT_ID: storemink-staging
  # The Firebase project's own firebase-adminsdk SA — the SIGNER for custom
  # tokens / session cookies (see lib/auth/firebase-admin.ts). Per-env.
  _FIREBASE_SA_ID: firebase-adminsdk-fbsvc@storemink-staging.iam.gserviceaccount.com
  # Firebase web config is PUBLIC (it ships in the client bundle) — not secret.
  # The apiKey is left blank here only to keep GitHub secret-scanning quiet; the
  # triggers always pass the real per-env values via --substitutions (see
  # docs/gcp-ci-cd.md). A bare `gcloud builds submit` must pass it explicitly.
  _NEXT_PUBLIC_FIREBASE_API_KEY: ""
  _NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: storemink-staging.firebaseapp.com
  _NEXT_PUBLIC_FIREBASE_PROJECT_ID: storemink-staging
  _NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: storemink-staging.firebasestorage.app
  _NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "68037646295"
  _NEXT_PUBLIC_FIREBASE_APP_ID: "1:68037646295:web:388ef47d32e39c822b1d92"
  _NEXT_PUBLIC_ROOT_DOMAIN: staging.storemink.com
  _NEXT_PUBLIC_APP_URL: https://staging.storemink.com
  # Google Search Console property for the sitemap auto-submit (lib/seo). Empty
  # on staging (never indexed → the submitter is a no-op anyway). The PROD
  # trigger passes sc-domain:storemink.com and grants the runtime SA access to
  # that property in Search Console — no key/secret needed (auth via ADC).
  _GOOGLE_SEARCH_CONSOLE_PROPERTY: ""
