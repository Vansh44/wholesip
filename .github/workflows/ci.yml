name: Next.js CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

permissions:
  contents: read

jobs:
  ci:
    name: Next.js CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint Check
        run: npm run lint

      - name: Type Check
        run: npm run typecheck

      - name: Run Tests
        run: npm run test

      - name: Format Check
        run: npm run prettier --check

      # CI verification only — catches build breaks before deploy. Deploys are
      # OWNED by the Cloud Build triggers (cloudbuild.yaml): staging -> service
      # storemink-web, main -> storemink-web-prod. They are the ONLY path that
      # bakes the NEXT_PUBLIC_* build args (e.g. NEXT_PUBLIC_ROOT_DOMAIN) into
      # the client bundle and wires runtime env/secrets/Cloud SQL. See
      # docs/gcp-ci-cd.md.
      #
      # Do NOT add a `gcloud run deploy --source` / deploy-cloudrun step here:
      # a source deploy CANNOT pass Docker build args, so it ships an empty
      # NEXT_PUBLIC_ROOT_DOMAIN and (finishing after the Cloud Build trigger)
      # clobbers the good revision — which broke staging (apex resolved as a
      # store slug "staging"; /dashboard fell back to the WholeSip store).
      - name: Build Project
        run: npm run build
