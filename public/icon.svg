<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="StoreMink">
  <defs>
    <linearGradient id="bag" x1="150" y1="96" x2="372" y2="468" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3E6BF6"/>
      <stop offset=".52" stop-color="#5A46EC"/>
      <stop offset="1" stop-color="#7A2FDD"/>
    </linearGradient>
    <linearGradient id="bars" x1="0" y1="270" x2="0" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#93B2FF"/>
      <stop offset="1" stop-color="#A97DFF"/>
    </linearGradient>
    <linearGradient id="sheen" x1="120" y1="120" x2="300" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".20"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#160A45" flood-opacity=".35"/>
    </filter>
  </defs>

  <!-- handle (behind bag) -->
  <path d="M176 168 V118 C176 80 206 56 256 56 C306 56 336 80 336 118 V168"
        fill="none" stroke="url(#bag)" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- bag body -->
  <rect x="96" y="150" width="320" height="320" rx="56" fill="url(#bag)"/>
  <rect x="96" y="150" width="320" height="320" rx="56" fill="url(#sheen)"/>

  <!-- ascending growth bars -->
  <g filter="url(#soft)">
    <rect x="284" y="344" width="30" height="74"  rx="15" fill="url(#bars)"/>
    <rect x="330" y="308" width="30" height="110" rx="15" fill="url(#bars)"/>
    <rect x="376" y="270" width="30" height="148" rx="15" fill="url(#bars)"/>
  </g>

  <!-- white M / rising roofline -->
  <path d="M150 402 V300 L272 238" fill="none" stroke="#ffffff"
        stroke-width="56" stroke-linecap="round" stroke-linejoin="miter" stroke-miterlimit="6"/>
</svg>
